# =========================================================
# CLIENT DEFINITIONS
# Each client represents a model endpoint + behavior profile
# =========================================================
clients:

  # -------------------------------------------------------
  # MAIN CLIENT (fast, general-purpose)
  # -------------------------------------------------------
  main:
    type: chat                      # Client type: chat or embeddings
    base_url: http://localhost:1212/v1
    model: qwen3.5-9b              # Model identifier
    tokenizer: Qwen/Qwen3.5-9B     # Tokenizer (HF tag or local path to json)
    api_key_env: LLM_API_KEY       # Environment variable for API key

    # --- Generation tuning (speed-oriented) ---
    presence_penalty: 1.5          # Encourage new topics
    top_k: 20                      # Limit token sampling pool
    temperature: 0.85              # Higher = more creative
    max_tokens: 22000              # Max response length

    system_prompt: >
      You are a helpful and efficient terminal assistant.

    # --- Optional: expose this client as a tool ---
    register_as_tool: true
    tool_name: FastAssistant
    description: Fast general-purpose assistant for quick responses

    # --- Methods define callable behaviors ---
    methods:
      - target: ask                # Single-turn interaction
        name: quick_answer
        description: Fast single-turn answer
        tags: [fast, qa, cheap]

      - target: chat               # Multi-turn interaction
        name: short_chat
        description: Short conversational response
        tags: [chat, fast]


  # -------------------------------------------------------
  # REASONING CLIENT (slow, high-quality reasoning)
  # -------------------------------------------------------
  reasoning:
    type: chat
    model: qwen3.5-9b
    tokenizer: ../model/tokenizer.json   # Local tokenizer path

    # --- Reasoning-optimized tuning ---
    presence_penalty: 1.2
    top_k: 30
    enable_thinking: true         # Enables internal reasoning mode
    temperature: 0.4              # Lower = more deterministic
    max_tokens: 28000

    system_prompt: >
      You are a deep reasoning assistant.
      Think step by step before answering.

    # --- Expose as a high-level reasoning tool ---
    register_as_tool: true
    tool_name: HeavyReasoning
    description: Strong reasoning model for planning and complex tasks

    methods:
      - target: ask
        name: deep_think
        description: Multi-step reasoning for complex problems
        tags: [reasoning, planning, slow, accurate]

      - target: chat
        name: structured_reasoning
        description: Multi-turn structured reasoning
        tags: [reasoning, chat, analysis]


  # -------------------------------------------------------
  # EMBEDDINGS CLIENT (vector generation only)
  # -------------------------------------------------------
  embeddings:
    type: embeddings
    model: embedding-gemma-300m
    tokenizer: /home/voldemar/Dev/AI/model/tokenizer.json


# =========================================================
# TOOL SETS
# Define available tool collections
# =========================================================
tools:

  FileEditingTools: {}     # File read/write/edit utilities

  TerminalTools: {}        # Shell execution tools
                          # (defaults to internal implementation)

  # Example external tool set:
  # external_set:
  #   folder: ~/mytools    # Auto-load all .py tools from folder


# =========================================================
# AGENTS
# Agents orchestrate clients + tools to perform tasks
# =========================================================
agents:

  # -------------------------------------------------------
  # HIGH-LEVEL REASONING AGENT
  # -------------------------------------------------------
  agent_001:
    id: agent_001
    name: Headless Reasoner
    description: High reasoning agent for complex tasks

    client: reasoning         # Uses reasoning client

    # --- Execution limits ---
    max_iterations: 50        # Max tool/LLM cycles
    max_reflections: 5        # Self-correction passes

    # --- Override generation settings ---
    temperature: 0.4
    max_tokens: 28000

    # --- Tool access ---
    tool_sets:
      - FileEditingTools
      - TerminalTools
    # --- Workflow tuning --- 
    workflow:
          steps:
            - llm_stream
            - execute_if_tools
            - check_complete
            - reflect_if_stuck
            - safety_fallback

  # -------------------------------------------------------
  # FAST CHAT AGENT
  # -------------------------------------------------------
  agent_002:
    id: agent_002
    name: Casual Chat Agent
    description: Quick-response assistant

    client: main              # Uses fast client

    max_iterations: 10
    max_reflections: 2

    temperature: 0.85
    max_tokens: 12000

    tool_sets:
      - FileEditingTools
      - TerminalTools


# =========================================================
# GLOBAL APPLICATION SETTINGS
# =========================================================
app:

  max_iterations: -1          # Unlimited iterations (-1 = no cap)
  max_tokens: 32000           # Global max token budget

  # --- Logging configuration ---
  logging_enabled: true
  log_level: info             # debug | info | warning | error
  log_to_file: true
  log_to_ui: false

  log_file: ~/.neuralcore/neuralvoid.log

  # --- Tool verbosity ---
  tool_info_level: compact    # compact | verbose
