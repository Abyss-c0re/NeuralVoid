clients:
  main:
    type: chat
    base_url: http://localhost:1212/v1
    model: qwen3.5-9b
    tokenizer: /home/voldemar/Dev/AI/model/tokenizer.json
    api_key_env: LLM_API_KEY

    # generation tuning
    presence_penalty: 1.5
    top_k: 20
    temperature: 0.85
    max_tokens: 22000

    system_prompt: "You are a helpful and efficient terminal assistant."

    # 🔧 expose as tool (optional lightweight model)
    register_as_tool: true
    tool_name: FastAssistant
    description: "Fast general-purpose assistant for quick responses"

    methods:
      - target: ask
        name: quick_answer
        description: "Fast single-turn answer"
        tags: ["fast", "qa", "cheap"]

      - target: chat
        name: short_chat
        description: "Short conversational response"
        tags: ["chat", "fast"]

  reasoning:
    type: chat
    model: qwen3.5-9b
    tokenizer: ../model/tokenizer.json

    # reasoning tuning
    presence_penalty: 1.2
    top_k: 30
    enable_thinking: true
    temperature: 0.4
    max_tokens: 28000

    system_prompt: "You are a deep reasoning assistant. Think step by step before answering."

    # 🧠 expose as high-level reasoning tool
    register_as_tool: true
    tool_name: HeavyReasoning
    description: "Strong reasoning model for planning and complex multi-step tasks"

    methods:
      - target: ask
        name: deep_think
        description: "Careful multi-step reasoning for complex problems"
        tags: ["reasoning", "planning", "slow", "accurate"]

      - target: chat
        name: structured_reasoning
        description: "Multi-turn structured reasoning conversation"
        tags: ["reasoning", "chat", "analysis"]

  embeddings:
    type: embeddings
    model: embedding-gemma-300m
    tokenizer: /home/voldemar/Dev/AI/model/tokenizer.json

tools:
  # Just list each tool set by name
  FileEditingTools: {}
  TerminalTools: {} # Default internal tool file: tools/terminal_set.py
  #  external_set:
  #   folder: ~/mytools     # Optional external folder, auto-load all .py files

agents:
  agent_001:
    id: "agent_001"
    name: "Headless Reasoner"
    description: "High reasoning agent for complex tasks"
    client: reasoning
    max_iterations: -1
    max_reflections: 5
    temperature: 0.4
    max_tokens: 28000
    tool_sets:
      - FileEditingTools
      - TerminalTools
    workflow:
      name: balanced_hybrid
      description: "Fast chat + tools + smart enough for coding/docs"
      steps:
        - name: plan_tasks
          if:
            iteration: { le: 2 }

        - name: llm_stream

        - name: execute_if_tools
          if:
            has_tools: true

        - name: verify_goal_completion
          if:
            is_complete: true

        - name: check_complete
          if:
            is_complete: false

        - name: reflect_if_stuck
          if:
            and:
              - iteration: { gt: 15 }
              - no_tools_recently: true
              - reflection_count: { lt: 3 }

        - name: safety_fallback

  agent_002:
    id: "agent_002"
    name: "Terminal Chat Agent"
    description: "Terminal assistant"
    client: main
    max_iterations: 100
    max_reflections: 2
    temperature: 0.8
    max_tokens: 28000
    system_prompt: "You are a helpful and efficient terminal assistant. Use provided tools if needed. Use browse_tools to obtain the best tools for the current step."
    tool_sets:
      - FileEditingTools
      - TerminalTools
    workflow:
      name: balanced_hybrid
      description: "Fast chat + tools + smart enough for coding/docs"
      steps:
        - name: plan_tasks
          if:
            iteration: { le: 2 }

        - name: llm_stream

        - name: execute_if_tools
          if:
            has_tools: true

        - name: verify_goal_completion
          if:
            is_complete: true

        - name: check_complete
          if:
            is_complete: false

        - name: reflect_if_stuck
          if:
            and:
              - iteration: { gt: 15 }
              - no_tools_recently: true
              - reflection_count: { lt: 3 }

        - name: safety_fallback

app:
  max_iterations: -1
  max_tokens: 32000
  logging_enabled: true
  log_level: debug
  log_to_file: true
  log_to_ui: false
  log_file: ~/.neuralcore/neuralvoid.log
  tool_info_level: compact
