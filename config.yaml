clients:
  main:
    type: chat
    base_url: http://localhost:1212/v1
    model: qwen3.5-9b
    tokenizer: /home/user/Dev/AI/model/tokenizer.json #can be HF token
    api_key_env: LLM_API_KEY

    # generation tuning
    presence_penalty: 1.5
    top_k: 20
    temperature: 0.85
    max_tokens: 22000

    system_prompt: "You are a helpful and efficient terminal assistant."

    # 🔧 expose as tool (optional lightweight model)
    register_as_tool: true
    tool_name: FastAssistant
    description: "Fast general-purpose assistant for quick responses"

    methods:
      - target: ask
        name: quick_answer
        description: "Fast single-turn answer"
        tags: ["fast", "qa", "cheap"]

      - target: chat
        name: short_chat
        description: "Short conversational response"
        tags: ["chat", "fast"]

  reasoning:
    type: chat
    model: qwen3.5-9b
    tokenizer: /home/user/Dev/AI/model/tokenizer.json

    # reasoning tuning
    presence_penalty: 1.2
    top_k: 30
    enable_thinking: true
    temperature: 0.4
    max_tokens: 28000

    system_prompt: "You are a deep reasoning assistant. Think step by step before answering."

    # 🧠 expose as high-level reasoning tool
    register_as_tool: true
    tool_name: HeavyReasoning
    description: "Strong reasoning model for planning and complex multi-step tasks"

    methods:
      - target: ask
        name: deep_think
        description: "Careful multi-step reasoning for complex problems"
        tags: ["reasoning", "planning", "slow", "accurate"]

      - target: chat
        name: structured_reasoning
        description: "Multi-turn structured reasoning conversation"
        tags: ["reasoning", "chat", "analysis"]

    # embeddings:
    #   type: embeddings
    #   model: embedding-gemma-300m
    #   tokenizer: /home/user/Dev/AI/model/tokenizer.json

    embeddings:
      use_fastembed: true # ← set false to force original llama.cpp
      fastembed_model: "BAAI/bge-small-en-v1.5"

tools:
  # Just list each tool set by name
  FileEditingTools: {}
  TerminalTools: {} # Default internal tool file: tools/terminal_set.py
  #  external_set:
  #   folder: ~/mytools     # Optional external folder, auto-load all .py files
workflows:
  deploy_chat:
    name: "deploy_chat"
    description: "Persistent natural conversation mode for Deploy Agent"
    steps:
      - name: deploy_chat_loop

  # Orchestrator: Now a full planning + ReAct workflow (as per your example)
  # Added clear conditions based on common agent state variables.

  default:
    name: "default"
    description: "Orchestrator: Plans → deploys sub-agents → waits → validates"
    steps:
      - name: plan_tasks
      - name: deploy_sub_agents
      - name: wait_for_sub_agents
      - name: verify_goal_completion
      - name: check_complete
      - name: reflect_if_stuck
      - name: safety_fallback

  # Sub-agent workflow: Classic ReAct loop (no top-level planning step, since planning is handled by the orchestrator/default)

  sub_agent_execute:
    name: "sub_agent_execute"
    description: "Classic ReAct execution loop used by all sub-agents (LLM + tools + reflection)"
    steps:
      - name: llm_stream
      - name: execute_if_tools
        if:
          has_tools: true
      - name: verify_goal_completion
        if:
          is_complete: true
      - name: check_complete
        if:
          is_complete: false
      - name: reflect_if_stuck
        if:
          or:
            - and:
                - iteration: { gt: 6 }
                - no_tools_recently: true
            - and:
                - iteration: { gt: 8 }
                - reflection_count: { lt: 8 }
            - and:
                - iteration: { gt: 12 }
                - no_tools_recently: true
                - reflection_count: { lt: 10 }
      - name: replan_if_reflected
        if:
          and:
            - last_reflection_iteration: { gt: 0 }
            - iteration: { gt: last_reflection_iteration }
      - name: safety_fallback
agents:
  agent_001:
    id: "agent_001"
    name: "Headless Reasoner"
    description: "Main orchestrator agent - plans and deploys sub-agents for complex tasks"
    client: reasoning
    max_iterations: -1
    max_reflections: 6
    temperature: 0.35
    max_tokens: 28000
    max_sub_agents: 8 # ← NEW: limit on how many sub-agents can be spawned
    tool_sets:
      - FileEditingTools
      - TerminalTools
    workflow: default # Uses the new orchestrator workflow

  agent_002:
    id: "agent_002"
    name: "Terminal Chat Agent"
    description: "Terminal assistant - starts in natural chat mode"
    client: main
    max_iterations: 100
    max_reflections: 3
    temperature: 0.8
    max_tokens: 28000
    max_sub_agents: 5 # ← NEW: limit for this agent too
    system_prompt: "You are a helpful and efficient terminal assistant."
    tool_sets:
      - FileEditingTools
      - TerminalTools
    workflow: deploy_chat # ← Changed to deploy_chat as default (recommended)

  sub_agent_002:
    id: "sub_agent_002"
    name: "Terminal Sub-Agent"
    description: "Sub-agent spawned by Terminal Chat Agent"
    client: main
    is_sub_agent: true
    max_iterations: 12
    max_reflections: 3
    temperature: 0.3
    max_tokens: 18000
    system_prompt: "You are a focused sub-agent helping the main Terminal Chat Agent."
    tool_sets:
      - FileEditingTools
      - TerminalTools
    workflow: sub_agent_execute

# Optional: Global defaults / settings
settings:
  default_max_sub_agents: 6
  sub_agent_temperature: 0.25
  sub_agent_max_iterations: 15 # ← simple string, this is what you want for chat

app:
  max_iterations: -1
  max_tokens: 32000
  logging_enabled: true
  log_level: debug
  log_to_file: true
  log_to_ui: false
  log_file: ~/.neuralcore/neuralvoid.log
  tool_info_level: compact
