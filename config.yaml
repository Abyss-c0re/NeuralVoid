clients:
  main:
    type: chat
    base_url: http://localhost:1212/v1
    model: qwen3.5-9b
    tokenizer: Qwen/Qwen3.5-9B
    api_key_env: LLM_API_KEY
    presence_penalty: 1.5
    top_k: 20
    temperature: 0.85
    max_tokens: 22000
    system_prompt: "You are a helpful and efficient terminal assistant."

  reasoning:
    type: chat
    model: qwen3.5-9b
    tokenizer: Qwen/Qwen3.5-9B
    presence_penalty: 1.2
    top_k: 30
    enable_thinking: true
    temperature: 0.4
    max_tokens: 28000

    register_as_tool: true
    tool_name: HeavyReasoning
    description: "Strong reasoning model for planning and complex tasks"

    system_prompt: "You are a deep reasoning assistant. Think step by step before answering."

  embeddings:
    type: embeddings
    model: embedding-gemma-300m
    tokenizer: Qwen/Qwen3.5-9B

tools:
  enabled_sets: ["terminal", "file"]

agents:
  headless:
    max_iterations: -1 #inf
    max_tokens: 24000
    other_flag: true

app:
  max_iterations: -1
  max_tokens: 32000
  logging_enabled: true
  log_level: info
  log_to_file: true
  log_to_ui: false
  log_file: ~/.neuralcore/neuralvoid.log
  tool_info_level: compact
